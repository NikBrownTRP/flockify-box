[Unit]
# The stock raspotify.service starts as soon as multi-user.target is
# reached, which on a cold boot happens before DNS + the Spotify AP are
# actually reachable. librespot then fails with
#   "could not initialize spirc: Service unavailable { client error (Connect) }"
# and even after Restart=on-failure brings it back, the second instance
# silently ends up in zeroconf-only mode (the device is never registered
# with the Spotify Web API). Delaying until network-online is settled
# eliminates the root cause.
After=network-online.target
Wants=network-online.target

# Drop-in override for raspotify.service
#
# Runs raspotify as user nbrown so it can reach nbrown's PipeWire/PulseAudio
# session at /run/user/1000/. Also disables the stock raspotify systemd
# hardening (ProtectHome, PrivateUsers, etc.) that otherwise makes
# /run/user/1000/ inaccessible to the service.
#
# Requires: sudo loginctl enable-linger nbrown
#
# Installed to /etc/systemd/system/raspotify.service.d/override.conf
# by scripts/install.sh
#
[Service]
User=nbrown
Group=nbrown
SupplementaryGroups=audio pulse pulse-access bluetooth

# --- Disable sandboxing that blocks access to the user session ---
# ProtectHome=true hides /home AND /run/user/* — we need the latter
ProtectHome=false
# PrivateUsers=true maps UIDs via namespace; breaks /run/user/1000 access
PrivateUsers=false
# ProtectSystem=strict makes most of the FS read-only; PipeWire needs more
ProtectSystem=false
ProtectProc=default
ProtectControlGroups=false
ProtectKernelTunables=false
ProtectKernelModules=false
ProtectKernelLogs=false
PrivateTmp=false
RestrictNamespaces=false
# Allow all character devices (needed for PipeWire/BlueZ audio routing)
DevicePolicy=auto
# Drop the strict device allowlist from the main unit
DeviceAllow=

# --- Session env so librespot can find PipeWire via D-Bus ---
Environment="XDG_RUNTIME_DIR=/run/user/1000"
Environment="DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/1000/bus"

# --- Self-heal on failure ---
# librespot occasionally fails to initialise spirc at first boot with
# "Service unavailable { client error (Connect) }" when Spotify's backend
# is briefly unreachable. Without Restart=on-failure, the stock unit
# leaves librespot in a zombie state (advertising zeroconf but never
# registered with the Web API), which makes the Spotify Web API show
# zero devices until someone manually restarts the service.
# Give DNS / routes a moment to truly settle even after network-online.target
# reports ready — systemd-resolved can still be warming up.
ExecStartPre=/bin/sleep 5
Restart=on-failure
RestartSec=15s
StartLimitIntervalSec=0
