# Drop-in override for raspotify.service
#
# Runs raspotify as user nbrown so it can connect to the user's
# PulseAudio/PipeWire socket. Requires: sudo loginctl enable-linger nbrown
#
# Installed to /etc/systemd/system/raspotify.service.d/override.conf
# by scripts/install.sh
#
[Service]
User=nbrown
Group=nbrown
Environment="PULSE_SERVER=unix:/run/user/1000/pulse/native"
Environment="XDG_RUNTIME_DIR=/run/user/1000"
