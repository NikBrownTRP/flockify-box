<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Flockify">
    <meta name="theme-color" content="#FFFBF5">
    <link rel="apple-touch-icon" href="/static/img/apple-touch-icon.png">
    <link rel="icon" type="image/x-icon" href="/static/img/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon-32.png">
    <link rel="manifest" href="/static/manifest.json">
    <title>Flockify Box</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="app-header">
        <div class="app-brand">
            <span class="app-brand-mark">🐯</span>
            <span class="app-brand-name">Flockify Box</span>
        </div>
    </header>
    <nav class="nav-bar">
        <a href="/" class="nav-tab {% if request.path == '/' %}active{% endif %}">Dashboard</a>
        <a href="/playlists" class="nav-tab {% if request.path == '/playlists' %}active{% endif %}">Playlists</a>
        <a href="/settings" class="nav-tab {% if request.path == '/settings' %}active{% endif %}">Settings</a>
    </nav>

    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <script src="/static/js/app.js"></script>
</body>
</html>
