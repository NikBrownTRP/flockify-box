<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Flockify">
    <meta name="theme-color" content="#6B5B95">
    <link rel="apple-touch-icon" href="/static/img/apple-touch-icon.png">
    <link rel="icon" type="image/x-icon" href="/static/img/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon-32.png">
    <link rel="manifest" href="/static/manifest.json">
    <title>Super Flockify</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="nav-bar">
        <a href="/" class="nav-tab {% if request.path == '/' %}active{% endif %}">Dashboard</a>
        <a href="/playlists" class="nav-tab {% if request.path == '/playlists' %}active{% endif %}">Playlists</a>
        <a href="/settings" class="nav-tab {% if request.path == '/settings' %}active{% endif %}">Settings</a>
    </nav>

    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <script src="/static/js/app.js"></script>
</body>
</html>
