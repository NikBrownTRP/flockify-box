device_name: flockifybox
device_type: speaker

zeroconf_enabled: true
credentials:
  type: zeroconf
  zeroconf:
    persist_credentials: true

# MUST use ALSA backend, NOT pulseaudio. go-librespot's PulseAudio
# backend has a bug that produces ~28% zero samples (audio dropouts),
# causing scratchy/overdriven sound. ALSA through PipeWire's compat
# layer works perfectly (1.3% zeros = normal for speech content).
audio_backend: alsa
audio_device: default
bitrate: 320
volume_steps: 100
initial_volume: 100

normalisation_disabled: true
normalisation_pregain: -3

server:
  enabled: true
  address: 127.0.0.1
  port: 3678
